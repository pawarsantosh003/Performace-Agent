stages:
  - test

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_CACHE_DIR: "1"
  PERF_AGENT_CONFIG: "examples/ci_release_gate_config.json"

readiness_gate:
  image: python:3.11
  stage: test
  script:
    - python -m pip install -e .
    - |
      set +e
      python -m perf_agent run --config "$PERF_AGENT_CONFIG" --out runs --release-gate
      GATE_CODE=$?
      export GATE_CODE
      python scripts/post_gitlab_performance_comment.py || true
      exit "$GATE_CODE"
  allow_failure:
    exit_codes:
      - 1
  artifacts:
    when: always
    paths:
      - runs/
    expire_in: 1 week
